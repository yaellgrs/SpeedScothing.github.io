<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="scripts/script.js" defer></script>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/ConfirmRecord.css" />
    <title>Speed Scotching</title>
  </head>
  <body>
        <div class="menu">
          <label>Timer</label>
          <a href="record.html">Record</a>
        </div>

        <div id="container">
            <div id="timer" class='timer'>00:00:00</div>

        </div>
        

        <!-- RECORD FORMULAIRE    -->
        <div id="recordOverlay" class="record-Overlay">
          <div class="record-Box">
            <div>
              <label for="author">SpeedSchotcheur</label>
              <input type="text" id="author" name="author"/>
            </div>
            <h2 id="timerBrut">timer brute : 00:00:00</h2>
            <form id="recordForm" class="record-Form">
              <div id="penality" class="penality">
                <label id="penalityCounter">Pénalités: +0s</label>
                <div id="penalityAdded">

                </div>
                <div id="penalityToAdd">
                  <button type="button" class="penalityButtonToAdd" value=3>+ oublie scotch</button>
                  <button type="button" class="penalityButtonToAdd" value=3>+ scotch mal placé</button>
                  <button type="button" class="penalityButtonToAdd" value=10>+ oublie grave</button>
                </div>
              </div>

              <h2 id="timerFinal">timer final: 00:00:00</h2>
              
              <div>
                <label for="category">Catégorie</label>
                <select id="category" name="category">
                  <option value="FSSP">FSSP</option>
                  <option value="FSSP+tag">FSSP+tag</option>
                  <option value="SP unseed">SP unseed</option>
                  <option value="FP unseed">FP unseed</option>
                </select>
              </div>

              <div>
                
                <label for="officiel">Officiel record</label><br>
                <input type="checkbox" id="officiel" name="officiel" value="officiel">
              </div>


              <div class="record-actions">
                <button type="submit" id="recordValidate">Valider</button>
                <button type="button" id="recordCancel">Annuler</button>
              </div>
            </form>
          </div>

        </div>

  </body>
</html>
